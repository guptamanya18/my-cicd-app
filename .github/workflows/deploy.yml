name: CI/CD Pipeline - Test and Deploy to AWS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy to AWS Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    env:
      APP_NAME: ${{ secrets.EB_APP_NAME }}
      ENV_NAME: ${{ secrets.EB_ENV_NAME }}
      SHA: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create deployment package
        run: zip -r deploy.zip . -x "*.git*" -x "node_modules/*" -x "coverage/*"

      - name: Upload to S3
        run: aws s3 cp deploy.zip s3://${APP_NAME}-deployments/deploy-${SHA}.zip

      - name: Create EB application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name ${APP_NAME} \
            --version-label ${SHA} \
            --source-bundle S3Bucket=${APP_NAME}-deployments,S3Key=deploy-${SHA}.zip

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --application-name ${APP_NAME} \
            --environment-name ${ENV_NAME} \
            --version-label ${SHA}

      - name: Wait for deployment
        run: |
          aws elasticbeanstalk wait environment-updated \
            --application-name ${APP_NAME} \
            --environment-names ${ENV_NAME}

      - name: Print deployment URL
        run: |
          URL=$(aws elasticbeanstalk describe-environments \
            --application-name ${APP_NAME} \
            --environment-names ${ENV_NAME} \
            --query 'Environments[0].CNAME' \
            --output text)
          echo "========================================="
          echo "Deployed! App URL: http://$URL"
          echo "========================================="